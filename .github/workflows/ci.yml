name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      UV_TORCH_BACKEND: cpu # the CUDA-bundled default wheel drags in multi-GB nvidia deps
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Lint
        run: |
          ruff check lenslapse scripts server tests
          ruff format --check lenslapse scripts server tests
      - name: Type-check
        run: mypy lenslapse tests
      - name: Test
        run: pytest tests

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
