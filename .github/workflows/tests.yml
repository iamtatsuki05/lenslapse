name: Tests

# The one definition of the Python and web test suites, shared by ci.yml (pushes/PRs) and
# publish-pypi.yml (release gate) via workflow_call — so what gates a release can never
# drift from what CI runs.
on:
  workflow_call:

jobs:
  test-uv:
    runs-on: ubuntu-latest
    env:
      UV_TORCH_BACKEND: cpu # the CUDA-bundled default wheel drags in multi-GB nvidia deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run tox

  # the wheel bundles the web app's shell, so a red web suite must block publishing too
  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
